name: CI

on:
  push:
    tags:
      - '*'

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Run tests
        run: echo "Running tests..."

  build:
    runs-on: ubuntu-latest
    needs: test
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Build and push
        run: |
          echo "Building and pushing image for ${{ github.ref_name }}..."
          echo "AWS_GH_ROLE=${{ vars.AWS_GH_ROLE }}"
          echo "ECR_REGISTRY=${{ vars.ECR_REGISTRY }}"
          echo "Image tag: ${{ vars.ECR_REGISTRY }}/pos:${{ github.ref_name }}"
