name: Release newone

on:
  push:
    tags:
      - '*'

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Run tests
        run: echo "Running tests..."

  release:
    needs: test
    runs-on: ubuntu-latest
    environment: newone
    steps:
      - uses: actions/checkout@v4
      - name: Build
        run: |
          echo "Building for newone..."
          echo "CUSTOMVALUE=${{ vars.CUSTOMVALUE }}"
      - name: Deploy
        run: |
          echo "Deploying to newone..."
          echo "CUSTOMVALUE=${{ vars.CUSTOMVALUE }}"
