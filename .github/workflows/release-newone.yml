name: Release newone

on:
  workflow_dispatch:

jobs:
  check-tag:
    if: github.ref_type == 'tag'
    runs-on: ubuntu-latest
    steps:
      - run: echo "Releasing ${{ github.ref_name }} to newone"

  test:
    needs: check-tag
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Run tests
        run: echo "Running tests..."

  release:
    needs: test
    runs-on: ubuntu-latest
    environment: newone
    steps:
      - uses: actions/checkout@v4
      - name: Build
        run: |
          echo "Building for newone (${{ github.ref_name }})..."
          echo "CUSTOMVALUE=${{ vars.CUSTOMVALUE }}"
      - name: Deploy
        run: |
          echo "Deploying to newone (${{ github.ref_name }})..."
          echo "CUSTOMVALUE=${{ vars.CUSTOMVALUE }}"
