name: Deploy
run-name: "Deploy ${{ github.ref_name }} → ${{ github.ref_type == 'tag' && 'all environments' || inputs.target }}"

on:
  push:
    tags:
      - '*'
  workflow_dispatch:
    inputs:
      target:
        description: 'Environment to deploy to'
        required: true
        type: choice
        options:
          - oldone
          - newone

jobs:

  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Run tests
        run: |
          echo "Running tests for ${{ github.ref_name }}..."
          echo "Tests passed"

  define-environments:
    runs-on: ubuntu-latest
    outputs:
      environments: ${{ steps.set-environments.outputs.environments }}
    steps:
      - name: Set target environments
        id: set-environments
        run: |
          if [[ "${{ github.ref_type }}" == "tag" ]]; then
            echo "environments=[\"oldone\", \"newone\"]" >> $GITHUB_OUTPUT
            echo "Deploying tag ${{ github.ref_name }} to all environments"
          else
            echo "environments=[\"${{ inputs.target }}\"]" >> $GITHUB_OUTPUT
            echo "Deploying to ${{ inputs.target }} only"
          fi

  build:
    needs: [define-environments, test]
    runs-on: ubuntu-latest
    strategy:
      matrix:
        environment: ${{ fromJson(needs.define-environments.outputs.environments) }}
    environment: ${{ matrix.environment }}
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Build
        run: |
          echo "Building image for ${{ github.ref_name }}..."
          echo "AWS_GH_ROLE=${{ vars.AWS_GH_ROLE }}"
          echo "ECR_REGISTRY=${{ vars.ECR_REGISTRY }}"
          echo "Image tag: ${{ vars.ECR_REGISTRY }}/pos:${{ github.ref_name }}"

  deploy:
    needs: [define-environments, build]
    runs-on: ubuntu-latest
    strategy:
      matrix:
        environment: ${{ fromJson(needs.define-environments.outputs.environments) }}
    environment: ${{ matrix.environment }}
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Deploy
        run: |
          echo "Deploying ${{ github.ref_name }} to ${{ matrix.environment }}..."
          echo "ECS_CLUSTER_NAME=${{ vars.ECS_CLUSTER_NAME }}"
          echo "CUSTOMVALUE=${{ vars.CUSTOMVALUE }}"
