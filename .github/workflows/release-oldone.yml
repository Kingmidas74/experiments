name: Release oldone

on:
  push:
    tags:
      - '*'

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Run tests
        run: echo "Running tests..."

  release:
    needs: test
    runs-on: ubuntu-latest
    environment: oldone
    steps:
      - uses: actions/checkout@v4
      - name: Build
        run: |
          echo "Building for oldone..."
          echo "CUSTOMVALUE=${{ vars.CUSTOMVALUE }}"
      - name: Deploy
        run: |
          echo "Deploying to oldone..."
          echo "CUSTOMVALUE=${{ vars.CUSTOMVALUE }}"
