name: Deploy

on:
  workflow_dispatch:
    inputs:
      target:
        description: 'Deploy target'
        required: true
        type: choice
        options:
          - oldone
          - newone

jobs:
  check-tag:
    if: github.ref_type == 'tag'
    runs-on: ubuntu-latest
    steps:
      - run: echo "Deploying ${{ github.ref_name }} to ${{ inputs.target }}"

  deploy:
    needs: check-tag
    runs-on: ubuntu-latest
    environment: ${{ inputs.target }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Deploy
        run: |
          echo "Deploying ${{ github.ref_name }} to ${{ inputs.target }}..."
          echo "CUSTOMVALUE=${{ vars.CUSTOMVALUE }}"
